<!DOCTYPE html>
<html>
<head> 
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Pefectures</title>
</head>
<body>
<div id="page">
    <div id="mapWrapper">
        <div id="map"></div>
        
        <div id="legend">
            <div class="legend-item">
                <span>R - toggle names</span>
            </div>

            <div class="legend-item">
                <span>F - show name</span>
            </div>
        </div>
        <div id="question">
            <div id="Romaji"></div>
            <div id="Kanji"></div>
        </div>
        <div id="legend_colors">
            <div class="legend-item">
                <span class="color-box correct"></span>
                <span>Correct</span>
            </div>

            <div class="legend-item">
                <span class="color-box wrong"></span>
                <span>Wrong</span>
            </div>
        </div>
        <button id="continue" onclick="buttonContinue()">
            Continue
            <div id="notice">
                spacebar
            </div>
        </button>
    </div>
</div>

<a id="homeButton" href="index.html">↩</a>

<style>

path { 
    transition: fill 0.3s ease;
    cursor: crosshair;
}

#question {
    margin: 0;
    line-height: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 0;
    pointer-events: none;
    
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translate(-50%, 0);

    display: flex;
    flex-direction: column;
    gap: 6px;

    padding: 8px;
    border-radius: 6px;

    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(4px);

    font-size: 12px;
}

#Romaji {
    font-size: clamp(16px, 2.5vh, 64px);
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
}

#Romaji.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto; 
}

#Kanji {
    display: flex;
    justify-content: center;
    align-items: center;
    width: clamp(30px, 20vh, 350px);
    font-size: clamp(24px, 5vh, 160px);
    white-space: nowrap;
}

#map {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
}

#continue {
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
}

#continue.show { 
    opacity: 1;
    transform: translateY(6px);
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {

    fetch("prefectures.svg")
    .then(response => response.text())
    .then(svgText => {

        const map = document.getElementById("map");
        map.innerHTML = svgText;

        const svg = map.querySelector("svg");
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
        const regions = [...svg.querySelectorAll("path[id]")];

        if (!svg || regions.length === 0) {
            document.getElementById("Kanji").textContent = "Shit's dead";
            return;
        }

        const COOLDOWN_TURNS = Math.round(regions.length / 3);
        const cooldowns = {};

        regions.forEach(r => {
            r.dataset.originalFill =
                r.getAttribute("fill") ||
                getComputedStyle(r).fill;
        });

        let guessing = false;
        let romaji = false;
        let currentTarget = null;

        function updateCooldowns() {
            for (const id in cooldowns) {
                cooldowns[id]--;
                if (cooldowns[id] <= 0) delete cooldowns[id];
            }
        }

        document.getElementById("legend").classList.toggle("show");

        function pickTarget() {
            document.getElementById("Romaji").classList.remove("show");
            
            updateCooldowns();

            const available = regions.filter(r => !cooldowns[r.id]);
            const pool = available.length ? available : regions;

            currentTarget = pool[Math.floor(Math.random() * pool.length)];

            cooldowns[currentTarget.id] = COOLDOWN_TURNS;

            const name = currentTarget.getAttribute("name") || currentTarget.id;

            document.getElementById("Kanji").textContent = name;

            if (document.getElementById("Romaji").textContent == "") {
                document.getElementById("Romaji").textContent = currentTarget.id;
            }

            guessing = true;
        }

        function reveal(region) {
            guessing = false;

            if (region === currentTarget) {
                region.style.fill = "#33FF33";
            } else {
                region.style.fill = "#FF3333";
                currentTarget.style.fill = "#33FF33";
            }

            document.getElementById("Romaji").textContent = currentTarget.id;
            document.getElementById("Romaji").classList.add("show");
            document.getElementById("legend_colors").classList.toggle("show");
            document.getElementById("continue").classList.toggle("show");
        }

        function resetAndContinue() {
            if (guessing) return;

            regions.forEach(r => {
                r.style.fill = r.dataset.originalFill;
            });

            document.getElementById("legend_colors").classList.toggle("show");
            document.getElementById("continue").classList.toggle("show");

            pickTarget();
        }

        regions.forEach(region => {
            region.addEventListener("click", (e) => {
                if (!guessing) return;
                e.stopPropagation();
                reveal(region);
            });
        });

        document.addEventListener("keydown", (e) => {
            if (guessing) return;

            if (e.code === "Space" || e.code === "Enter") {
                regions.forEach(r => {
                    r.style.fill = r.dataset.originalFill;
                });

                resetAndContinue();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.code === "KeyR") {
                if (romaji) {
                    romaji = false;
                }
                else {
                    romaji = true;
                    document.getElementById("Romaji").textContent = currentTarget.id;
                    document.getElementById("Romaji").classList.add("show");
                }
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.code === "KeyF") {
                document.getElementById("Romaji").textContent = currentTarget.id;
                document.getElementById("Romaji").classList.add("show");
            }
        });

        window.buttonContinue = function () {
            if (guessing) return;

            regions.forEach(r => {
                r.style.fill = r.dataset.originalFill;
            });

            resetAndContinue();

        }

        let viewBox = svg.viewBox.baseVal;

        const baseWidth = viewBox.width;
        const baseHeight = viewBox.height;

        const zoomSwitchAt = 2.5;
        
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 15;

        let isPanning = false;
        let startMouse = {x: 0, y: 0};
        let startViewBox = {x: 0, y: 0};

        function updateViewBox() {
            svg.setAttribute(
                "viewBox",
                `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`
            );
        }

        function getSvgMousePosition(e) {

            const rect = svg.getBoundingClientRect();
            const viewAspect = viewBox.width / viewBox.height;
            const rectAspect = rect.width / rect.height;

            let renderedWidth = rect.width;
            let renderedHeight = rect.height;

            let offsetX = 0;
            let offsetY = 0;

            if (rectAspect > viewAspect) {
                renderedWidth = rect.height * viewAspect;
                offsetX = (rect.width - renderedWidth) / 2;
            } 
            else {
                renderedHeight = rect.width / viewAspect;
                offsetY = (rect.height - renderedHeight) / 2;
            }

            return {
                x: (e.clientX - rect.left - offsetX) / renderedWidth,
                y: (e.clientY - rect.top - offsetY) / renderedHeight
            };

        }

        svg.addEventListener("mousedown", e => {
            isPanning = true;

            const mouse = getSvgMousePosition(e);

            startMouse.x = mouse.x;
            startMouse.y = mouse.y;

            startViewBox.x = viewBox.x;
            startViewBox.y = viewBox.y;

            svg.style.cursor = "grabbing";

            e.preventDefault();
        });

        window.addEventListener("mouseup", () => {
            isPanning = false;
            svg.style.cursor = "grab";
        });

        window.addEventListener("mousemove", e => {
            if (!isPanning) return;

            const mouse = getSvgMousePosition(e);

            const dx = (mouse.x - startMouse.x) * viewBox.width;
            const dy = (mouse.y - startMouse.y) * viewBox.height;

            viewBox.x = startViewBox.x - dx;

            viewBox.y = startViewBox.y - dy;

            updateViewBox();
        });

        svg.addEventListener("wheel", e => {
            e.preventDefault();

            const zoomFactor = 1.1;
            const mouse = getSvgMousePosition(e);
            const scale = baseWidth / viewBox.width;

            let newScale = scale * (e.deltaY < 0 ? zoomFactor : 1 / zoomFactor);

            newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newScale));

            const newWidth = baseWidth / newScale;
            const newHeight = baseHeight / newScale;

            viewBox.x += (viewBox.width - newWidth) * mouse.x;
            viewBox.y += (viewBox.height - newHeight) * mouse.y;

            viewBox.width = newWidth;
            viewBox.height = newHeight;

            updateViewBox();
        }, { passive:false });

        pickTarget();
    });
});
</script>

</body>
</html>
