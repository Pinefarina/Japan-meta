<style>

path { 
    transition: fill 0.3s ease;
    cursor: crosshair;
}

#question {
    width: 100%;
    margin: 0;
    line-height: 1.1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 0;
}

#Romaji {
    font-size: clamp(16px, 5vh, 64px);
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
}

#Romaji.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto; 
}

#Kanji {
    display: flex;
    justify-content: center;
    align-items: center;
    width: clamp(72px, 45vh, 480px);
    font-size: clamp(24px, 15vh, 160px);
    white-space: nowrap;
    line-height: 1;
}

#map {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
}

.hidden {
    visibility: hidden;
}

#status {
    justify-self: end;
    align-self: center;
    font-size: 36px;
    color: #9e9e9e;
    transition: color 0.25s ease, background-color 0.25s ease;
    border-radius: 8px;
    padding: 5px;
}

#status.glow {
    background-color: #ff4d4d;
    color: #000000;
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const svg = document.getElementById("map");
    const regions = [...svg.querySelectorAll("path[id]")];

    if (!svg || regions.length === 0) {
        document.getElementById("Kanji").textContent = "Shit's dead";
        return;
    }

    const COOLDOWN_TURNS = Math.round(regions.length / 3);
    const cooldowns = {};

    regions.forEach(r => {
        r.dataset.originalFill =
            r.getAttribute("fill") ||
            getComputedStyle(r).fill;
    });

    let guessing = false;
    let romaji = false;
    let currentTarget = null;

    function updateCooldowns() {
        for (const id in cooldowns) {
            cooldowns[id]--;
            if (cooldowns[id] <= 0) delete cooldowns[id];
        }
    }

    document.getElementById("legend").classList.toggle("show");

    function pickTarget() {
        document.getElementById("Romaji").classList.remove("show");
        
        updateCooldowns();

        const available = regions.filter(r => !cooldowns[r.id]);
        const pool = available.length ? available : regions;

        currentTarget = pool[Math.floor(Math.random() * pool.length)];

        cooldowns[currentTarget.id] = COOLDOWN_TURNS;

        const name = currentTarget.getAttribute("name") || currentTarget.id;

        document.getElementById("Kanji").textContent = name;

        if (document.getElementById("Romaji").textContent == "") {
            document.getElementById("Romaji").textContent = currentTarget.id;
        }

        guessing = true;
    }

    function reveal(region) {
        guessing = false;

        if (region === currentTarget) {
            region.style.fill = "#33FF33";
        } else {
            region.style.fill = "#FF3333";
            currentTarget.style.fill = "#33FF33";
        }

        document.getElementById("Romaji").textContent = currentTarget.id;
        document.getElementById("Romaji").classList.add("show");
    }

    function resetAndContinue() {
        if (guessing) return;

        regions.forEach(r => {
            r.style.fill = r.dataset.originalFill;
        });

        pickTarget();
    }

    regions.forEach(region => {
        region.addEventListener("click", (e) => {
            if (!guessing) return;
            e.stopPropagation();
            reveal(region);
        });
    });

    document.addEventListener("click", (e) => {
        if (guessing) return;
        if (svg.contains(e.target)) return;
        resetAndContinue();
    });

    document.addEventListener("keydown", (e) => {
        if (guessing) return;

        if (e.code === "Space" || e.code === "Enter") {
            regions.forEach(r => {
                r.style.fill = r.dataset.originalFill;
            });

            resetAndContinue();
        }
    });

    document.addEventListener("keydown", (e) => {
        if (e.code === "KeyR") {
            if (romaji) {
                romaji = false;
                document.getElementById("status").classList.remove("glow");
            }
            else {
                romaji = true;
                document.getElementById("Romaji").textContent = currentTarget.id;
                document.getElementById("Romaji").classList.add("show");
                document.getElementById("status").classList.add("glow");
            }
        }
    });

    document.addEventListener("keydown", (e) => {
        if (e.code === "KeyF") {
            document.getElementById("Romaji").textContent = currentTarget.id;
            document.getElementById("Romaji").classList.add("show");
        }
    });

    let viewBox = svg.viewBox.baseVal;

    const baseWidth = viewBox.width;
    const baseHeight = viewBox.height;

    const MIN_ZOOM = 0.9;
    const MAX_ZOOM = 10;

    let isPanning = false;
    let start = { x: 0, y: 0 };

    function updateViewBox() {
        svg.setAttribute(
            "viewBox",
            `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`
        );
    }

    svg.addEventListener("mousedown", (e) => {
        isPanning = true;
        start.x = e.clientX;
        start.y = e.clientY;
        svg.style.cursor = "grabbing";
    });

    window.addEventListener("mouseup", () => {
        isPanning = false;
        svg.style.cursor = "grab";
    });

    window.addEventListener("mousemove", (e) => {
        if (!isPanning) return;

        const dx = (e.clientX - start.x) * (viewBox.width / svg.clientWidth);
        const dy = (e.clientY - start.y) * (viewBox.height / svg.clientHeight);

        viewBox.x -= dx;
        viewBox.y -= dy;

        start.x = e.clientX;
        start.y = e.clientY;

        updateViewBox();
    });

    svg.addEventListener("wheel", (e) => {
        e.preventDefault();

        const zoomFactor = 1.1;

        const rect = svg.getBoundingClientRect();

        const mouseX = (e.clientX - rect.left) / rect.width;
        const mouseY = (e.clientY - rect.top) / rect.height;

        const scale = baseWidth / viewBox.width;

        let newScale = scale * (e.deltaY < 0 ? zoomFactor : 1 / zoomFactor);

        newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newScale));

        const newWidth = baseWidth / newScale;
        const newHeight = baseHeight / newScale;

        if (
            (newScale === MIN_ZOOM && e.deltaY > 0) ||
            (newScale === MAX_ZOOM && e.deltaY < 0)
        ) return;

        viewBox.x += (viewBox.width - newWidth) * mouseX;
        viewBox.y += (viewBox.height - newHeight) * mouseY;

        viewBox.width = newWidth;
        viewBox.height = newHeight;

        updateViewBox();
    }, { passive: false });

    pickTarget();
});
</script>
