<!DOCTYPE html>
<html>
<head> 
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Phone Codes</title>
</head>
<body>
<div id="page">
    <div id="mapWrapper">
        
        <div id="map"></div>

        <div id="legend">
            <div id="question">
                <div id="Romaji"></div>
                <div id="Kanji"></div>
                <div id="PhoneCode"></div>
            </div>
        </div>
    </div>
</div> 

<a id="homeButton" href="index.html">↩</a>

<style>

path { 
    transition: fill 0.3s ease;
    cursor: crosshair;
}

#question {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    line-height: 1.1;
}

#Romaji {
    font-size: clamp(18px, 2vw, 28px);
}

#Kanji {
    width: 6em;
    text-align: center;
    font-size: clamp(32px, 4vw, 72px);
    white-space: nowrap;
    line-height: 1;
}

#PhoneCode {
    font-size: clamp(16px, 1.5vw, 24px);
}

#map {
    width: 100%;
    height: 100%;
}

#map svg {
    width: 100%;
    height: 100%;
    display: block;
}

.hidden {
    visibility: hidden;
}

#status {
    justify-self: end;
    align-self: center;
    font-size: 36px;
    color: #9e9e9e;
    transition: color 0.25s ease, background-color 0.25s ease;
    border-radius: 8px;
    padding: 5px;
}

#status.glow {
    background-color: #ff4d4d;
    color: #000000;
}

.map-label,
.map-label-small {
    fill: #000000;
    stroke-width: 0;
    font-size: 30px;
    pointer-events: none;
    user-select: none;
    z-index: 100;
    transition: opacity 0.2s ease;
}

.map-label {
    opacity: 1;
}

.map-label-small {
    opacity: 0;
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {

    fetch("map.svg")
    .then(response => response.text())
    .then(svgText => {

        const map = document.getElementById("map");
        map.innerHTML = svgText;

        const svg = map.querySelector("svg");
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const regions = [...svg.querySelectorAll("path[id]")];

        let viewBox = svg.viewBox.baseVal;

        const baseWidth = viewBox.width;
        const baseHeight = viewBox.height;

        const zoomSwitchAt = 2.5;

        const mediumLabels = svg.querySelectorAll(".map-label");
        const smallLabels = svg.querySelectorAll(".map-label-small");

        const specialColors = {
            3: "hsl(100 23% 83%)",
            4: "hsl(120 23% 20%)",
            6: "hsl(240 23% 20%)",
        };

        const hues = {
            1: "0",
            2: "30",
            4: "120",
            5: "150",
            7: "210",
            8: "240",
            9: "270"
        };

        regions.forEach(region => {

            const label = region.getAttribute("inkscape:label");
            if (!label) return;

            const id = Number(label);

            if (specialColors[id]) {
                region.style.fill = specialColors[id];
                region.style.stroke = "#000000";
                return;
            }

            const normalized = String(id).padEnd(3, "0");
            const hue = hues[Number(normalized[0])];
            const shade = Number(normalized.slice(1, 3));

            const lightness = 20 + shade * (60 / 99);

            const color = `hsl(${hue} 23% ${lightness}%)`;

            region.style.fill = color;
            region.style.stroke = "#000000";
        });


        regions.forEach(region => {
            region.dataset.originalFill = region.getAttribute("fill") || getComputedStyle(region).fill;
        });

        function updateLabels() {

            const zoom = baseWidth / viewBox.width;

            if (zoom <= zoomSwitchAt) {

                smallLabels.forEach(label => {
                    label.style.opacity = 0;
                });

                mediumLabels.forEach(label => {
                    label.style.opacity = 1;
                });

            } else {

                smallLabels.forEach(label => {
                    label.style.opacity = 1;
                });

                mediumLabels.forEach(label => {
                    label.style.opacity = 0;
                });

            }
        }

        function mark(region) {

            region.style.fill = "#FFFFFF";

            document.getElementById("legend").classList.add("show");

            document.getElementById("Kanji").textContent =
                region.querySelector("title")?.textContent || "";

            document.getElementById("Romaji").textContent =
                region.id.replace(/[0-9]/g, "");

            document.getElementById("PhoneCode").textContent =
                "0" + region.getAttribute("inkscape:label");
        }

        function unmark() {

            regions.forEach(r => {
                r.style.fill = r.dataset.originalFill;
            });

            document.getElementById("legend").classList.remove("show");

            document.getElementById("Kanji").textContent = "";
            document.getElementById("Romaji").textContent = "";
            document.getElementById("PhoneCode").textContent = "";
        }

        regions.forEach(region => {

            region.addEventListener("click", e => {

                e.stopPropagation();

                if (getComputedStyle(region).fill === "rgb(255, 255, 255)") {
                    unmark();
                } else {
                    unmark();
                    mark(region);
                }

            });

        });

        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 15;

        let isPanning = false;
        let startMouse = {x: 0, y: 0};
        let startViewBox = {x: 0, y: 0};

        function updateLabelFont() {

            const baseScale = baseWidth / viewBox.width;

            const labelScale = Math.pow(baseScale, 0.8);


            document.querySelectorAll(".map-label").forEach(label => {

                label.style.fontSize =
                    `${100 / labelScale}px`;

            });


            document.querySelectorAll(".map-label-small").forEach(label => {

                label.style.fontSize =
                    `${60 / labelScale}px`;

            });

        }

        function updateViewBox() {

            svg.setAttribute(
                "viewBox",
                `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`
            );

        }

        function getSvgMousePosition(e) {

            const rect = svg.getBoundingClientRect();

            const viewAspect =
                viewBox.width / viewBox.height;

            const rectAspect =
                rect.width / rect.height;


            let renderedWidth = rect.width;
            let renderedHeight = rect.height;

            let offsetX = 0;
            let offsetY = 0;


            if (rectAspect > viewAspect) {

                // empty space left/right

                renderedWidth =
                    rect.height * viewAspect;

                offsetX =
                    (rect.width - renderedWidth) / 2;

            } else {

                // empty space top/bottom

                renderedHeight =
                    rect.width / viewAspect;

                offsetY =
                    (rect.height - renderedHeight) / 2;

            }


            return {

                x:
                (e.clientX - rect.left - offsetX)
                / renderedWidth,


                y:
                (e.clientY - rect.top - offsetY)
                / renderedHeight

            };

        }

        svg.addEventListener("mousedown", e => {

            isPanning = true;


            const mouse =
                getSvgMousePosition(e);


            startMouse.x = mouse.x;
            startMouse.y = mouse.y;


            startViewBox.x = viewBox.x;
            startViewBox.y = viewBox.y;


            svg.style.cursor = "grabbing";


            e.preventDefault();

        });

        window.addEventListener("mouseup", () => {

            isPanning = false;

            svg.style.cursor = "grab";

        });

        window.addEventListener("mousemove", e => {

            if (!isPanning) return;


            const mouse =
                getSvgMousePosition(e);


            const dx =
                (mouse.x - startMouse.x)
                * viewBox.width;


            const dy =
                (mouse.y - startMouse.y)
                * viewBox.height;



            viewBox.x =
                startViewBox.x - dx;


            viewBox.y =
                startViewBox.y - dy;


            updateViewBox();

        });

        svg.addEventListener("wheel", e => {

            e.preventDefault();


            const zoomFactor = 1.1;


            const mouse =
                getSvgMousePosition(e);



            const scale =
                baseWidth / viewBox.width;


            let newScale =
                scale *
                (e.deltaY < 0
                    ? zoomFactor
                    : 1 / zoomFactor);



            newScale =
                Math.max(
                    MIN_ZOOM,
                    Math.min(MAX_ZOOM, newScale)
                );



            const newWidth =
                baseWidth / newScale;


            const newHeight =
                baseHeight / newScale;



            viewBox.x +=
                (viewBox.width - newWidth)
                * mouse.x;


            viewBox.y +=
                (viewBox.height - newHeight)
                * mouse.y;



            viewBox.width = newWidth;

            viewBox.height = newHeight;



            updateViewBox();

            updateLabelFont();

            updateLabels();


        }, { passive:false });

        updateLabelFont();


    });

});
</script>
</script>

</body>
</html>
