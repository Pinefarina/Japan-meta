<style>
    
path { 
    transition: fill 0.3s ease;
    cursor: crosshair;
}

#name {
    margin: 0;
    text-align: center;
    font-size: 24px;
}

#svgs {
    width: 320px;
    height: 650px;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    
    position: absolute;
    top: 10px;
    left: 10px;

    justify-content: center;
    align-items: center;

    display: flex;
    flex-direction: column;
    gap: 6px;

    padding: 0px;
    border-radius: 6px;

    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(4px);

}

#layerContainer {
    position: relative;
    width: 100%;
    height: 600px;
}

.layer {
    position: absolute;
    inset: 0;
    
    width: 100%;
    height: 100%;
    
    object-fit: contain;

    opacity: 0;
    transition: opacity 0.5s ease;
}

.shown {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    opacity: 1;
    transition: opacity 0.5s ease;
}

#map {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
}

#prefectures
 {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translate(-50%, -6px);


    display: flex;
    flex-direction: column;
    gap: 6px;

    padding: 8px;
    border-radius: 6px;

    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(4px);

    font-size: 20px;
}

#prefectures.show {
    opacity: 1;
    transform: translate(-50%, 0);
    pointer-events: auto;    
}

</style>

<script>
document.addEventListener("DOMContentLoaded", () => {

    fetch("prefectures.svg")
    .then(response => response.text())
    .then(svgText => {

        const map = document.getElementById("map");
        map.innerHTML = svgText;

        const svg = map.querySelector("svg");
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
        const regions = [...svg.querySelectorAll("path[id]")];
        const marked = new Set();
        const questions = [
            {
                id: "horizontal",
                name: "Horizontal",
                correct: new Set(["Saga", "Shimane", "Tottori"]),
                key: "Saga | Shimane | Tottori"
            },
            {
                id: "horizontalsmall",
                name: "Horizontal Small",
                correct: new Set(["Saga"]),
                key: "Saga"
            },
            {
                id: "horizontalthin",
                name: "Horizontal Thin",
                correct: new Set(["Saga"]),
                key: "Saga"
            },
            {
                id: "genericthin",
                name: "Generic Thin",
                correct: new Set(["Kagoshima", "Yamaguchi", "Aichi", "Nagano"]),
                key: "Kagoshima | Yamaguchi | Aichi | Nagano"
            },
            {
                id: "kagawa",
                name: "C Type",
                correct: new Set(["Kagawa"]),
                key: "Kagawa"
            },
            {
                id: "outerrightsmall",
                name: "Diagonal Top Right Small",
                correct: new Set(["Tokushima", "Hiroshima"]),
                key: "Tokushima | Hiroshima"
            },
            {
                id: "shizuoka",
                name: "C Type Thin",
                correct: new Set(["Shizuoka"]),
                key: "Shizuoka"
            },
            {
                id: "aomori",
                name: "Diagonal Side",
                correct: new Set(["Aomori"]),
                key: "Aomori"
            },
            {
                id: "outerleft",
                name: "Diagonal Top Left",
                correct: new Set(["Mie", "Kochi"]),
                key: "Mie | Kochi"
            },
            {
                id: "outerright",
                name: "Diagonal Top Right",
                correct: new Set(["Miyagi", "Okayama", "Hyogo", "Kyoto"]),
                key: "Miyagi | Okayama | Hyogo | Kyoto"
            },
            {
                id: "outerleftthin",
                name: "Diagonal Top Left Thin",
                correct: new Set(["Ishikawa", "Kumamoto"]),
                key: "Ishikawa | Kumamoto"
            },
            {
                id: "htypeleft",
                name: "H Type Left",
                correct: new Set(["Okinawa", "Shiga", "Niigata", "Ibaraki", "Tochigi", "Saitama"]),
                key: "Okinawa | Shiga | Niigata | Ibaraki | Tochigi | Saitama"
            },
            {
                id: "htypeleftthin",
                name: "H Type Left Thin",
                correct: new Set(["Ibaraki", "Niigata"]),
                key: "Ibaraki | Niigata"
            },
            {
                id: "shurikenright",
                name: "Shuriken Right",
                correct: new Set(["Wakayama", "Nara"]),
                key: "Wakayama | Nara"
            },
            {
                id: "shurikenrightsmall",
                name: "Shuriken Right Small",
                correct: new Set(["Nara"]),
                key: "Nara"
            },
            {
                id: "htyperight",
                name: "H Type Right",
                correct: new Set(["Toyama", "Oita"]),
                key: "Toyama | Oita"
            },
            {
                id: "shurikenleft",
                name: "Shuriken Left",
                correct: new Set(["Chiba", "Gunma", "Gifu"]),
                key: "Chiba | Gunma | Gifu"
            },
            {
                id: "shurikenleftthin",
                name: "Shuriken Left Thin",
                correct: new Set(["Yamanashi", "Nagano"]),
                key: "Yamanashi | Nagano"
            }
        ];

        if (!svg || !regions.length || !questions.length) {
            console.log = ("Shit's dead");
            return;
        }

        const COOLDOWN_TURNS = Math.round(questions.length / 2);
        const cooldowns = {};

        regions.forEach(r => {
            r.dataset.originalFill =
                r.getAttribute("fill") ||
                getComputedStyle(r).fill;
        });

        let guessing = false;
        let romaji = false;
        let currentTarget = null;

        function updateCooldowns() {
            for (const id in cooldowns) {
                cooldowns[id]--;
                if (cooldowns[id] <= 0) delete cooldowns[id];
            }
        }

        function loadQuestion() {
            
            updateCooldowns();

            const available = questions.filter(r => !cooldowns[r.id]);
            const pool = available.length ? available : questions;

            currentTarget = pool[Math.floor(Math.random() * pool.length)];

            cooldowns[currentTarget.id] = COOLDOWN_TURNS;

            const name = currentTarget.name ||currentTarget.id;
            
            
            document.getElementById("name").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("name").textContent = name;
                document.getElementById("name").style.opacity = 1;
            }, 120);

            document.getElementById(currentTarget.id).classList.add('shown');
            document.getElementById(currentTarget.id).classList.remove('layer');
            
            guessing = true;
        }

        function mark(region) {

            if (marked.has(region.id)) {
                marked.delete(region.id);
                region.classList.remove("selected");
                region.style.fill = region.dataset.originalFill;
            } else {
                marked.add(region.id);
                region.classList.add("selected");
                region.style.fill = "#F4D35E";
            }
        }

        function reveal() {

            guessing = false;
            const answers = new Set(currentTarget.correct);
            
            let correct = new Set( [...marked].filter(id => answers.has(id)) );
            let wrong = new Set( [...marked].filter(id => !answers.has(id)) );
            let wrongneeded = new Set( [...answers].filter(id => !marked.has(id)) );

            regions.forEach(region => {
                if (correct.has(region.id)) {
                    region.style.fill = "#2ECC71";
                }
                else if (wrong.has(region.id)) {
                    region.style.fill = "#E74C3C";
                }
                else if (wrongneeded.has(region.id)) {
                    region.style.fill = "#1F6FEB";
                }
            });

            document.getElementById("prefectures").classList.toggle("show");
            document.getElementById("prefectures").textContent = currentTarget.key;
            document.getElementById("legend_colors").classList.toggle("show");

        }

        function resetAndContinue() {
            if (guessing) return;

            regions.forEach(r => {
                r.style.fill = r.dataset.originalFill;
            });

            document.getElementById(currentTarget.id).classList.remove('shown');
            document.getElementById(currentTarget.id).classList.add('layer');

            marked.clear();

            document.getElementById("prefectures").classList.toggle("show");
            document.getElementById("legend_colors").classList.toggle("show");

            loadQuestion()

        }

        regions.forEach(region => {
            region.addEventListener("click", (e) => {
                if (!guessing) return;
                e.stopPropagation();
                mark(region);
            });
        });

        window.buttonPress = function() {
            if (guessing) {
                reveal()
            }
            else {
                resetAndContinue();
            }
        };

        document.addEventListener("keydown", (e) => {
            switch (e.code){
                case "Space":
                case "Enter":
                    if (guessing) {
                        reveal()
                        break;
                    }
                    else {
                        resetAndContinue();
                        break;
                    }
                }
        });

        let viewBox = svg.viewBox.baseVal;

        const baseWidth = viewBox.width;
        const baseHeight = viewBox.height;
        
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 35;

        let isPanning = false;
        let startMouse = {x: 0, y: 0};
        let startViewBox = {x: 0, y: 0};

        function updateViewBox() {
            svg.setAttribute(
                "viewBox",
                `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`
            );
        }

        function getSvgMousePosition(e) {

            const rect = svg.getBoundingClientRect();
            const viewAspect = viewBox.width / viewBox.height;
            const rectAspect = rect.width / rect.height;

            let renderedWidth = rect.width;
            let renderedHeight = rect.height;

            let offsetX = 0;
            let offsetY = 0;

            if (rectAspect > viewAspect) {
                renderedWidth = rect.height * viewAspect;
                offsetX = (rect.width - renderedWidth) / 2;
            } 
            else {
                renderedHeight = rect.width / viewAspect;
                offsetY = (rect.height - renderedHeight) / 2;
            }

            return {
                x: (e.clientX - rect.left - offsetX) / renderedWidth,
                y: (e.clientY - rect.top - offsetY) / renderedHeight
            };

        }

        svg.addEventListener("mousedown", e => {
            isPanning = true;

            const mouse = getSvgMousePosition(e);

            startMouse.x = mouse.x;
            startMouse.y = mouse.y;

            startViewBox.x = viewBox.x;
            startViewBox.y = viewBox.y;

            svg.style.cursor = "grabbing";

            e.preventDefault();
        });

        window.addEventListener("mouseup", () => {
            isPanning = false;
            svg.style.cursor = "grab";
        });

        window.addEventListener("mousemove", e => {
            if (!isPanning) return;

            const mouse = getSvgMousePosition(e);

            const dx = (mouse.x - startMouse.x) * viewBox.width;
            const dy = (mouse.y - startMouse.y) * viewBox.height;

            viewBox.x = startViewBox.x - dx;

            viewBox.y = startViewBox.y - dy;

            updateViewBox();
        });

        svg.addEventListener("wheel", e => {
            e.preventDefault();

            const zoomFactor = 1.1;
            const mouse = getSvgMousePosition(e);
            const scale = baseWidth / viewBox.width;

            let newScale = scale * (e.deltaY < 0 ? zoomFactor : 1 / zoomFactor);

            newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newScale));

            const newWidth = baseWidth / newScale;
            const newHeight = baseHeight / newScale;

            viewBox.x += (viewBox.width - newWidth) * mouse.x;
            viewBox.y += (viewBox.height - newHeight) * mouse.y;

            viewBox.width = newWidth;
            viewBox.height = newHeight;

            updateViewBox();
        }, { passive:false });

        loadQuestion();
    });
});
</script>
